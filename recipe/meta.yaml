{% set name = "access" %}
{% set version = "1.1.10.post3" %}
{% set test_root = "gh_src/access/tests" %}
{% set skip_keywords = [
  "TestEuclideanNeighbors"
] %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 3dbfbd7cc5a09d30ad314955d061fb46fd2d48ce1f84f15adc5b760bb8b4a34b
  # tests and tests data files
  - url: https://github.com/pysal/access/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 7f4ed30a20b4db702d14d46e3adb0677f600823e104207bd4d181731018dab79
    folder: gh_src

build:
  number: 0
  skip: true  # [py<37]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - wheel
  run:
    - geopandas
    - numpy >=1.3
    - pandas >=0.23.4
    - python
    - requests >=2

# =======================
# Test configuration
# =======================
# - TestEuclideanNeighbors:
# Disabled due to failing assertion: expected distance 1.0, got 0.0
# Likely caused by missing neighbors within the threshold or overlapping centroids
# Needs review of test data or distance calculation logic in `test_euclidean.py:133`
# https://github.com/pysal/access/blob/c2fc9a1a6c92a223ebe3157c1b4bc248eacc691f/access/tests/test_euclidean.py#L133
test:
  requires:
    - pip
    - python
    - matplotlib-base
    - pytest
    - pytest-xdist
    - scipy >=0.11
  source_files:
    - {{ test_root }}
  imports:
    - access
    - access.datasets
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -n auto -v {{ test_root }} -k "not ({{ skip_keywords | join(' or ') }})"

about:
  home: https://access.readthedocs.io
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Calculate spatial accessibility metrics
  description: This package provides classical and novel measures of spatial accessibility to services
  doc_url: https://access.readthedocs.io
  dev_url: https://github.com/pysal/access

extra:
  recipe-maintainers:
    - JamesSaxon
    - jkoschinsky
